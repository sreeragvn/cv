career-profile:
    title: Career Profile
    summary: |
      Applied ML data scientist with 3 years building and deploying industrial time-series,
      anomaly-detection, and generative models across aviation, weather, automotive, and optics.
      Peer-reviewed work at **ICLR 2026** and **ACM AutomotiveUI '24**, with production ML
      grounded in prior technical product-management experience.

education:
    title: Education
    info:
      - degree: M.Sc. in Computational Sciences in Engineering
        university: TU Braunschweig
        time: Oct 2021 - May 2024
        details: |
          - Final grade 1.4 (German scale, 1.0 = best). 
          - Top 4% of the graduating class.
          - Recipient of the Deutschlandstipendium.
      - degree: B.Tech in Mechanical Engineering
        university: University of Kerala
        time: Aug 2012 - Apr 2016
        details: |
          - First-author publication on flow-separation control in rocket nozzles
          (Materials Today: Proceedings), from a bachelor thesis at ISRO.
          - Top 1% in the KEAM state engineering entrance exam (106,071 candidates).

experiences:
    title: Experiences
    info:
      - role: Data Scientist
        time: Oct 2024 - Present
        company: DLR — Deutsches Zentrum für Luft- und Raumfahrt, Jena, Germany
        details: |
            - Engineered gradient boosting models predicting lens manufacturing costs and steps
              from specifications with <20% error, automating cost estimation where no automated
              method previously existed.
            - Published TEDM, a diffusion-based generative model for time-series forecasting,
              at ICLR 2026, achieving state-of-the-art results across multiple forecasting benchmarks.
            - Deployed production forecasting and anomaly-detection pipelines on telemetry streams
              for aviation and weather-monitoring clients.
            - Built a computer vision pipeline detecting damage in aircraft composite structures
              from ultrasonic D-scans with <5% error.
            - Designed and ran a recurring deep-learning workshop series with hands-on exercises
              for 50+ colleagues across DLR institutes.

      - role: Machine Learning Intern
        time: Oct 2023 - May 2024
        company: Porsche AG, Weissach, Germany
        details: |
            - Published CARSI II, a transformer-based recommender for automotive infotainment,
              at ACM AutomotiveUI '24 (Best Work-in-Progress Award), reaching >84% top-3 accuracy
              and recall for cold-start users after fine-tuning.
            - Adapted the self-supervised contrastive learning framework (SimCLR) with custom
              input augmentations to learn richer representations from sparse driver-interaction data.

      - role: Machine Learning Intern
        time: Apr 2023 - Sep 2023
        company: DLR — Deutsches Zentrum für Luft- und Raumfahrt, Stade, Germany
        details: |
            - Developed and deployed an internal DLR prototype for CFRP leakage detection
              and localization using a multi-task neural network with uncertainty quantification.
            - Improved model accuracy by >12% by encoding geometric equivariance of the sensor
              layout as a network-layer constraint.

      - role: Associate Product Manager — Technical
        time: Sep 2017 - Aug 2021
        company: Kalkitech, Kochi, India
        details: |
            - Developed thermodynamic and statistical models detecting equipment degradation from
              sensor data and generating predictive-maintenance schedules, reducing unplanned
              downtime in thermal power plants.
            - Built Grafana and Power BI dashboards tracking plant KPIs across 15+ multi-site
              client accounts in Europe, Asia, and the Middle East.
            - Led cross-functional delivery for Eltrix asset-management software, translating
              stakeholder requirements into product specifications for engineering, business,
              and client teams.

