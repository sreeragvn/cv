#Update all the sections by editing the data.yml file inside _data folder.

# Site Settings
title: Sreerag V Naveenachandran
url: 'https://sreeragvn.github.io' # set to your GitHub Pages URL, e.g. https://sreeragvn.github.io

baseurl: '/cv'

description: Applied ML / Data Scientist — Industrial Time Series, Anomaly Detection, Generative Models
# Style will be applied only after restarting the build or serve. Just choose one of the options.
theme_skin: blue # blue turquoise green berry orange ceramic
chrome_mobile_color: #use hex colors (ex:#1976d2) or leave empty if you don't want a color for chrome mobile searchbar

# Tracker
# analytics: # set your own Google Analytics ID here

# Sass/SCSS
sass:
  sass_dir: _sass
  style: compressed # http://sass-lang.com/documentation/file.SASS_REFERENCE.html#output_style

# Build settings
compress-site: yes

encoding: "utf-8"
compress_html: # - http://jch.penibelst.de/
  clippings: all
  ignore:
    envs: development

# Development Settings
port: 4000
host: 0.0.0.0
safe: false
